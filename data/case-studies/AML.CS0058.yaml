id: AML.CS0058
name: AIXBT Dashboard Compromise with Queued Adversarial Prompts
object-type: case-study
summary: "On 2025-03-18, an attacker infiltrated the operational dashboard
  of the AIXBT autonomous trading agent at approximately 02:00 UTC and
  queued two fraudulent prompts that directed the agent to transfer
  55.5 ETH (~$106K) from the agent's Simulacrum wallet to an
  attacker-controlled address.[<sup>\\[1\\]</sup>][1] This is a hybrid
  attack pattern: control-plane credential compromise enabled access
  to the agent's task queue, and prompt-level instruction injection
  then directed the agent to act.


  This case demonstrates the agentic-specific failure mode where
  control-plane authentication is the actual trust boundary, but the
  prompt layer is the actual execution vector. Pure-credential framing
  would not capture the role of the queued prompts; pure-prompt-injection
  framing would not capture the credential compromise. Both layers were
  necessary for the loss.\n\n

  [1]: https://incidentdatabase.ai/cite/1003/ \"AI Incident Database entry 1003\""
incident-date: 2025-03-18
incident-date-granularity: DATE
procedure:
- tactic: '{{credential_access.id}}'
  technique: '{{valid_accounts.id}}'
  description: "The attacker obtained credentials for AIXBT's operational
    dashboard. The disclosure does not specify the credential-acquisition
    vector (phishing, leaked secrets, insider access)."
- tactic: '{{initial_access.id}}'
  technique: '{{valid_accounts.id}}'
  description: "The attacker authenticated to the AIXBT dashboard at
    02:00 UTC on 2025-03-18 using the compromised credentials, gaining
    access to the agent's queued task interface."
- tactic: '{{resource_development.id}}'
  technique: '{{llm_prompt_crafting.id}}'
  description: "Two fraudulent prompts were crafted directing the agent
    to transfer 55.5 ETH from the Simulacrum wallet to a specific
    attacker-controlled destination address."
- tactic: '{{execution.id}}'
  technique: '{{manip_llm_history.id}}'
