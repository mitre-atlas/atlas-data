    upcoming-instruction context."
- tactic: '{{execution.id}}'
  technique: '{{llm_plugin_compromise.id}}'
  description: "The agent processed the queued prompts and invoked the
    on-chain transfer tools against the Simulacrum wallet, treating the
    queued context as a legitimate operator instruction."
- tactic: '{{exfiltration.id}}'
