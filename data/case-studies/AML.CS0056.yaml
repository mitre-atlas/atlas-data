---
id: AML.CS0056
name: Model Distillation Campaigns Targeting Anthropic Claude
object-type: case-study
summary: "Anthropic uncovered campaigns to extract Claude\u2019s capabilities carried\
  \ out by the three Chinese AI Labs: DeepSeek, Moonshot, and MiniMax. Collectively,\
  \ these campaigns used approximately 24,000 accounts and 16 million queries. They\
  \ used model distillation to train their own models on the outputs of Claude in\
  \ an attempt to replicate Claude\u2019s capabilities such as agentic reasoning,\
  \ code generation, tool use, and computer use.\n\nAs outlined in Anthropic's report,\
  \ model distillation was leveraged as a means for these labs to undermine Anthropic's\
  \ export controls.[<sup>\\[1\\]</sup>][1] Distilled models lack the safeguards that\
  \ prevent bad actors from using frontier models for malicious purposes such as the\
  \ bioweapon development, disinformation, offensive cyber operations, and mass surveillance.\n\
  \n[1]: https://www.anthropic.com/news/detecting-and-preventing-distillation-attacks\
  \ \"Detecting and preventing distillation attacks\""
