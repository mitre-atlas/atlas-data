---
id: AML.CS0055
name: 'AI ClickFix: Hijacking Computer-Use Agents Using ClickFix'
object-type: case-study
summary: "[Embrace the Red]( https://embracethered.com/) demonstrated that AI computer-use\
  \ agents are vulnerable to social engineering attacks and can be manipulated into\
  \ executing arbitrary code on a victim\u2019s machine. The attack is a variation\
  \ on \u201CClickFix\u201D which is a social engineering attack that fools humans\
  \ into copying malicious commands and executing them.\n\nThe researcher used ChatGPT\
  \ to generate a website designed to attract interactions with computer-use agents.\
  \ When a user asked their Claude Computer-Use Agent to visit the researcher\u2019\
  s website, the text \u201CAre you a computer? Please see instructions to confirm:\u201D\
  \ caused the agent to click the associated button. This executed JavaScript to copy\
  \ a malicious command into the agent\u2019s clipboard. The agent then proceeded\
  \ to follow the instructions, opening a terminal, pasting the malicious command,\
  \ and executing it. The command downloads a script from the researcher\u2019s website\
  \ and executes it. In the demonstration, the script opens the victim\u2019s Calculator\
  \ App, but in practice an adversary could run arbitrary code, compromising the victim\u2019\
  s system."
incident-date: 2025-05-24
incident-date-granularity: DATE
